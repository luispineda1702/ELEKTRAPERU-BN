apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-registro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicio-registro
  template:
    metadata:
      labels:
        app: servicio-registro
    spec:
      containers:
        - name: servicio-registro
          image: servicio-registro:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "host.minikube.internal"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "12345"
            - name: DB_NAME
              value: "elektraperu"
            - name: VALIDACION_URL
              value: "http://servicio-validacion:3001"
            - name: CORREO_URL
              value: "http://servicio-correo:3002"

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: servicio-registro
spec:
  selector:
    app: servicio-registro
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000