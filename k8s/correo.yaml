apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-correo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicio-correo
  template:
    metadata:
      labels:
        app: servicio-correo
    spec:
      containers:
        - name: servicio-correo
          image: servicio-correo:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: servicio-correo
spec:
  selector:
    app: servicio-correo
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: 3002