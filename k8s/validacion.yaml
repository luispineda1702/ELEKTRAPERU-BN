apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-validacion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicio-validacion
  template:
    metadata:
      labels:
        app: servicio-validacion
    spec:
      containers:
        - name: servicio-validacion
          image: servicio-validacion:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: servicio-validacion
spec:
  selector:
    app: servicio-validacion
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001